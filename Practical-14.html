<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Application</title>
    <style>
        /* Base Reset and Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0fdfa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 30px;
            margin: 20px;
            text-align: center;
        }

        /* Start Area */
        #start-area {
            display: block;
        }

        .name-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        .name-input:focus {
            outline: none;
            border-color: #0ea5e9;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }

        /* Quiz Area (Removed display: none from here) */
        #quiz-area {
            text-align: left;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .progress-badge {
            background-color: #e0f2fe;
            color: #0284c7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .score-badge {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #1f2937;
        }

        /* Options */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #374151;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f3f4f6;
            border-color: #d1d5db;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        /* Feedback States */
        .option-btn.correct {
            background-color: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
        }

        /* Results Area (Removed display: none from here) */
        #result-area {
            padding: 20px 0;
        }

        .trophy-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 1.2rem;
            color: #4b5563;
            margin-bottom: 30px;
        }

        .result-score span {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0ea5e9;
        }

        /* Reusable Primary Button */
        .primary-btn {
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .primary-btn:hover {
            background-color: #0284c7;
        }

        /* Main utility class for hiding sections */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="start-area">
            <div class="trophy-icon">👋</div>
            <h2 class="result-title">Welcome to the Quiz!</h2>
            <p style="margin-bottom: 25px; color: #4b5563;">Test your web development knowledge.</p>
            
            <div style="text-align: left;">
                <input type="text" id="username-input" class="name-input" placeholder="Enter your full name">
                <div class="error-msg" id="name-error">Please enter your name to begin.</div>
            </div>
            
            <button class="primary-btn" onclick="startQuiz()">Start Quiz</button>
        </div>

        <div id="quiz-area" class="hidden">
            <div class="header">
                <div class="progress-badge" id="progress">Question 1 / 5</div>
                <div class="score-badge">Score: <span id="current-score">0</span></div>
            </div>
            
            <h2 class="question-text" id="question">Loading question...</h2>
            
            <div class="options-container" id="options">
                </div>
        </div>

        <div id="result-area" class="hidden">
            <div class="trophy-icon">🏆</div>
            <h2 class="result-title">Quiz Completed!</h2>
            <p class="result-score" style="margin-bottom: 10px;">Great job, <strong id="display-name" style="color: #1f2937;">Player</strong>!</p>
            <p class="result-score">You scored <span id="final-score">0</span> out of <span id="total-questions">0</span></p>
            <button class="primary-btn" onclick="returnToStart()">Play Again</button>
        </div>

    </div>

    <script>
        // Quiz Data
        const quizData = [
            { question: "What does HTML stand for?", options: ["Hyper Text Preprocessor", "Hyper Text Markup Language", "Hyper Text Multiple Language", "Hyper Tool Multi Language"], correctAnswer: 1 },
            { question: "Which language runs in a web browser?", options: ["Java", "C", "Python", "JavaScript"], correctAnswer: 3 },
            { question: "What does CSS stand for?", options: ["Central Style Sheets", "Cascading Style Sheets", "Cascading Simple Sheets", "Cars SUVs Sailboats"], correctAnswer: 1 },
            { question: "Which of the following is NOT a JavaScript data type?", options: ["Undefined", "Number", "Boolean", "Float"], correctAnswer: 3 },
            { question: "How do you write a comment in HTML?", options: ["// This is a comment", "/* This is a comment */", "", "' This is a comment"], correctAnswer: 2 }
        ];

        // State Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let userName = "";

        // DOM Elements
        const startArea = document.getElementById('start-area');
        const quizArea = document.getElementById('quiz-area');
        const resultArea = document.getElementById('result-area');
        
        const usernameInput = document.getElementById('username-input');
        const nameError = document.getElementById('name-error');
        const displayName = document.getElementById('display-name');

        const questionElement = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const progressElement = document.getElementById('progress');
        const currentScoreElement = document.getElementById('current-score');
        
        const finalScoreElement = document.getElementById('final-score');
        const totalQuestionsElement = document.getElementById('total-questions');

        // Function to start quiz from the welcome screen
        function startQuiz() {
            const nameValue = usernameInput.value.trim();
            
            if (nameValue === "") {
                nameError.style.display = 'block';
                return;
            }
            
            // Save name and hide error
            userName = nameValue;
            nameError.style.display = 'none';

            // Switch screens
            startArea.classList.add('hidden');
            quizArea.classList.remove('hidden');

            // Reset variables (important if playing again)
            currentQuestionIndex = 0;
            score = 0;
            
            loadQuestion();
        }

        // Function to load a question
        function loadQuestion() {
            const currentQuizData = quizData[currentQuestionIndex];
            
            questionElement.textContent = currentQuizData.question;
            progressElement.textContent = `Question ${currentQuestionIndex + 1} / ${quizData.length}`;
            currentScoreElement.textContent = score;

            optionsContainer.innerHTML = '';

            currentQuizData.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.textContent = optionText;
                button.classList.add('option-btn');
                button.onclick = () => selectAnswer(index, button);
                optionsContainer.appendChild(button);
            });
        }

        // Function to handle answer checking
        function selectAnswer(selectedIndex, selectedButton) {
            const correctIndex = quizData[currentQuestionIndex].correctAnswer;
            const allButtons = optionsContainer.children;
            
            // Disable buttons to prevent multi-clicking
            for (let i = 0; i < allButtons.length; i++) {
                allButtons[i].disabled = true;
            }

            if (selectedIndex === correctIndex) {
                selectedButton.classList.add('correct');
                score++;
                currentScoreElement.textContent = score;
            } else {
                selectedButton.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }

            // Move to next question or show results after delay
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        // Function to display final results
        function showResults() {
            quizArea.classList.add('hidden');
            resultArea.classList.remove('hidden');
            
            // Inject the user's name and score
            displayName.textContent = userName;
            finalScoreElement.textContent = score;
            totalQuestionsElement.textContent = quizData.length;
        }

        // Function to return to the start screen
        function returnToStart() {
            resultArea.classList.add('hidden');
            startArea.classList.remove('hidden');
            usernameInput.value = ""; // Clear the input field for the next player
        }
    </script>
</body>
</html>
