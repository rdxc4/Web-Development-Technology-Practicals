<!DOCTYPE html>

<html>

<head>
<title>Student Registration</title>

</head>

<body bgcolor="yellow">

<center>

<h2>Student Registration</h2>

<form>
<label>First Name</label><br>

<input type="text" placeholder="Enter first name"><br><br>

<label>Last Name</label><br>

<input type="text" placeholder="Enter last name"><br><br>

<label>Phone Number</label><br>

<input type="tel" placeholder="Enter phone number"><br><br>
<label>Email</label><br>

<input type="email" placeholder="Enter email"><br><br>

<label>Date of Birth</label><br>

<input type="date"><br><br>

<label>Set Username</label><br>

<input type="text" placeholder="Set username"><br><br>
<label>Set Password</label><br>

<input type="password" placeholder="Set password"><br><br>

<label>Gender</label><br>
 

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<input type="radio" name="gender"> Other

<br><br>

<label>Department</label><br>
<dropdownlist>

<select name="Department">

<option disabled selected>Select Department</option>

<option>FOET</option>

<option>FOE</option>

<option>FOT</option>
<option>LAW</option>

<option>ARTS</option>

</select>

</dropdownlist>

<br><br>

<label>Course</label><br>
<dropdownlist>

<select name="Course">

<option disabled selected>Select Course</option>

<option>BBA</option>

<option>B.Com</option>

<option>CE</option>
<option>CSE</option>

<option>CSE-CS</option>

<option>CSE-AI&ML</option>

<option>CSE-AI&DS</option>

<option>Law</option>
 

</select>

</dropdownlist>

<br><br>

<input type="submit" value="Register">

<input type="reset" value="Clear">
<br><br>

<label>Already you have an account</label><br>

<td align="center" colspan="5">

<a href="#">Login</a>

</td>

</form>
</center>

</body>

</html>
