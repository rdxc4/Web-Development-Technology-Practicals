<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Portfolio - Lightbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .gallery-container {
            padding: 60px 0;
        }

        /* Image Card Styling */
        .img-card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.4s ease;
            margin-bottom: 24px;
        }

        .img-card img {
            transition: transform 0.5s ease, filter 0.5s ease;
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* Hover Effects */
        .img-card:hover img {
            transform: scale(1.1);
            filter: brightness(50%);
        }

        .img-overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: bottom 0.4s ease;
        }

        .img-card:hover .img-overlay {
            bottom: 0;
        }

        .category-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
        }

        /* Custom Modal / Lightbox Styling */
        .modal-backdrop.show {
            opacity: 0.9; /* Darker background for the lightbox */
        }
        #fullImage {
            max-height: 80vh;
            object-fit: contain;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container gallery-container">
    <div class="row text-center mb-5">
        <h1 class="display-4 fw-bold">Visual <span style="color: #00d4ff;">Gallery</span></h1>
        <p class="text-secondary">Click any image to view it in full screen.</p>
    </div>

    <div class="row" id="gallery-grid">
        <div class="col-md-4 col-sm-6">
            <div class="img-card shadow-lg" onclick="openLightbox('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1000', 'Cyberpunk City')">
                <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1000" alt="Tech">
                <div class="img-overlay">
                    <h5 class="fw-bold mb-0">Cyberpunk City</h5>
                    <span class="category-badge">Concept Art</span>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="img-card shadow-lg" onclick="openLightbox('https://images.unsplash.com/photo-1555861496-0666c8981751?q=80&w=1000', 'Neon Vibes')">
                <img src="https://images.unsplash.com/photo-1555861496-0666c8981751?q=80&w=1000" alt="Neon">
                <div class="img-overlay">
                    <h5 class="fw-bold mb-0">Neon Vibes</h5>
                    <span class="category-badge">Photography</span>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="img-card shadow-lg" onclick="openLightbox('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000', 'Abstract Waves')">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" alt="Abstract">
                <div class="img-overlay">
                    <h5 class="fw-bold mb-0">Abstract Waves</h5>
                    <span class="category-badge">Digital Design</span>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="img-card shadow-lg" onclick="openLightbox('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000', 'Liquid Colors')">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000" alt="Liquid">
                <div class="img-overlay">
                    <h5 class="fw-bold mb-0">Liquid Colors</h5>
                    <span class="category-badge">Abstract</span>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="img-card shadow-lg" onclick="openLightbox('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1000', 'Mountain Range')">
                <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1000" alt="Mountains">
                <div class="img-overlay">
                    <h5 class="fw-bold mb-0">Mountain Range</h5>
                    <span class="category-badge">Landscape</span>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="img-card shadow-lg" onclick="openLightbox('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=1000', 'Coding Matrix')">
                <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=1000" alt="Code">
                <div class="img-overlay">
                    <h5 class="fw-bold mb-0">Coding Matrix</h5>
                    <span class="category-badge">Technology</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center p-0">
        <img src="" id="fullImage" class="img-fluid rounded shadow" alt="Full Screen Image">
        <h4 id="imageCaption" class="text-white mt-3 fw-light tracking-wide"></h4>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize the Bootstrap Modal
    const lightboxModal = new bootstrap.Modal(document.getElementById('lightboxModal'));

    // Function to handle clicking an image
    function openLightbox(imageSrc, imageTitle) {
        // Set the image source and title in the modal
        document.getElementById('fullImage').src = imageSrc;
        document.getElementById('imageCaption').innerText = imageTitle;
        
        // Show the modal
        lightboxModal.show();
    }
</script>

</body>
</html>
