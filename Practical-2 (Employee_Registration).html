<!DOCTYPE html>
<html>

<head>

<title>Employee Registration</title>

</head>

<body bgcolor="yellow">

<center>
<h1>Employee Registration</h1>

<form>

<b>First Name</b><br>

<input type="text" placeholder="Enter first name"><br><br>

<b>Last Name</b><br>

<input type="text" placeholder="Enter last name"><br><br>
<b>Phone Number</b><br>

<input type="tel" placeholder="Enter phone number"><br><br>

<b>Email</b><br>

<input type="email" placeholder="Enter email"><br><br>

<b>Date of Joining</b><br>

<input type="date"><br><br>
<b>Employee ID</b><br>

<input type="text" placeholder="Enter employee ID"><br><br>

<b>Set Username</b><br>

<input type="text" placeholder="Set username"><br><br>

<b>Set Password</b><br>

<input type="password" placeholder="Set password"><br><br>
<b>Gender</b><br>
 

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<input type="radio" name="gender"> Other

<br><br>

<b>Department</b><br>
<select>

<option disabled selected>Select Department</option>

<option>HR</option>

<option>IT</option>

<option>Finance</option>

<option>Marketing</option>
<option>Acadamic</option>

</select>

<br><br>

<b>Designation</b><br>

<select>

<option disabled selected>Select Designation</option>
<option>Manager</option>

<option>Developer</option>

<option>Accountant</option>

<option>Assistant</option>

<option>Professor</option>

</select>
<br><br>

<input type="submit" value="Register">

<input type="reset" value="Clear">

</form>

<br>
 

Already you have an account<br>

<a href="employeedata.html">Login</a>

</center>

</body>

</html>
